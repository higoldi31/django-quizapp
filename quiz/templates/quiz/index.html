{% extends 'quiz/base.html' %}

{% block content %}
    <h1 class="fw-light fst-italic text-white text-center mt-5">Welcome</h1>
    {% if first_question %}
    <p class="text-center text-white"><a href="{% url 'question' first_question.id %}" class="link-warning link-offset-2 link-underline-opacity-100 link-underline-opacity-100-hover">Let's start quiz !</a></p>
    {% else %}
        <p>No questions available.</p>
    {% endif %}


{% endblock %}
