services:
 - type: web
    name: quizapp
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "gunicorn quizapp.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "quizapp.onrender.com,.onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECURE_SSL_REDIRECT
        value: "True"
 